name: Actualiser les tournois

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scraper les tournois
        run: node scrape.mjs

      - name: Commit tournaments.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tournaments.json
          git diff --staged --quiet || git commit -m "🔄 Mise à jour tournois $(date +'%d/%m/%Y %H:%M')"
          git push
