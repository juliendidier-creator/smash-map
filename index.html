<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tournois SSBU France</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #1a1a2e; color: #e0e0e0; }

  #sidebar {
    width: 380px; min-width: 380px; display: flex; flex-direction: column;
    background: #16213e; border-right: 1px solid #0f3460; overflow: hidden;
  }
  #sidebar-header { padding: 16px; background: #0f3460; }
  #sidebar-header h1 { font-size: 1.2rem; color: #e94560; margin-bottom: 12px; }

  .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .filter-btn {
    padding: 5px 12px; border-radius: 16px; border: 1px solid #0f3460;
    background: #1a1a2e; color: #e0e0e0; cursor: pointer; font-size: 0.8rem;
    transition: all 0.2s;
  }
  .filter-btn.active { background: #e94560; border-color: #e94560; color: #fff; }
  .filter-btn:hover { border-color: #e94560; }

  #search {
    width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid #0f3460;
    background: #1a1a2e; color: #e0e0e0; font-size: 0.85rem; outline: none;
  }
  #search:focus { border-color: #e94560; }
  #search::placeholder { color: #666; }

  #stats-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 16px; border-bottom: 1px solid #0f3460;
  }
  #stats { flex: 1; font-size: 0.75rem; color: #888; }
  #refresh-btn {
    flex-shrink: 0; padding: 4px 10px; border-radius: 14px;
    border: 1px solid #0f3460; background: #1a1a2e; color: #888;
    cursor: pointer; font-size: 0.75rem; transition: all 0.2s;
    display: flex; align-items: center; gap: 5px;
  }
  #refresh-btn:hover:not(:disabled) { border-color: #e94560; color: #e94560; }
  #refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  #refresh-btn .spin { display: none; animation: spin 1s linear infinite; }
  #refresh-btn.loading .spin { display: inline; }
  #refresh-btn.loading .icon { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #refresh-log {
    display: none; padding: 8px 16px; font-size: 0.7rem; color: #666;
    font-family: monospace; border-bottom: 1px solid #0f3460;
    max-height: 80px; overflow-y: auto; background: #0d1b2a;
  }
  #refresh-log.visible { display: block; }

  #tournament-list {
    flex: 1; overflow-y: auto; padding: 0;
  }
  #tournament-list::-webkit-scrollbar { width: 6px; }
  #tournament-list::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }

  .tournament-item {
    padding: 12px 16px; border-bottom: 1px solid #0f3460; cursor: pointer;
    transition: background 0.15s;
  }
  .tournament-item:hover { background: #1a1a2e; }
  .tournament-item .t-name { font-weight: 600; font-size: 0.9rem; color: #fff; margin-bottom: 4px; }
  .tournament-item .t-meta { font-size: 0.78rem; color: #888; }
  .tournament-item .t-meta span { margin-right: 10px; }
  .tournament-item .t-type {
    display: inline-block; padding: 1px 8px; border-radius: 10px;
    font-size: 0.7rem; font-weight: 600; margin-left: 6px;
  }
  .type-weekly { background: #533483; color: #d4a5ff; }
  .type-tournoi { background: #0f3460; color: #53d8fb; }

  .t-distance { color: #e94560; font-weight: 600; }

  #map { flex: 1; background: #b8d4e8; }

  /* Anneau creux : centre vide → les marqueurs de tournois restent visibles dessous */
  .home-icon {
    background: transparent;
    border: 3px solid #e94560;
    border-radius: 50%;
    width: 26px; height: 26px;
    box-shadow: 0 0 0 3px rgba(233,69,96,0.25), 0 0 10px rgba(233,69,96,0.4);
    animation: pulse-home 2s ease-in-out infinite;
  }
  @keyframes pulse-home {
    0%, 100% { box-shadow: 0 0 0 3px rgba(233,69,96,0.25), 0 0 10px rgba(233,69,96,0.3); }
    50%       { box-shadow: 0 0 0 7px rgba(233,69,96,0.1), 0 0 18px rgba(233,69,96,0.5); }
  }

  .leaflet-popup-content-wrapper {
    background: #16213e; color: #e0e0e0; border-radius: 10px;
    border: 1px solid #0f3460;
  }
  .leaflet-popup-tip { background: #16213e; }
  .leaflet-popup-content { font-size: 0.85rem; line-height: 1.5; }
  .leaflet-popup-content a { color: #e94560; text-decoration: none; }
  .leaflet-popup-content a:hover { text-decoration: underline; }
  .popup-type { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; }

  /* Token modal */
  #token-modal {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 9999; align-items: center; justify-content: center;
  }
  #token-modal.visible { display: flex; }
  #token-box {
    background: #16213e; border: 1px solid #0f3460; border-radius: 12px;
    padding: 24px; width: 360px; max-width: 90vw;
  }
  #token-box h3 { color: #e94560; margin-bottom: 8px; font-size: 1rem; }
  #token-box p { font-size: 0.8rem; color: #888; margin-bottom: 12px; line-height: 1.5; }
  #token-box a { color: #e94560; }
  #token-input {
    width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid #0f3460;
    background: #1a1a2e; color: #e0e0e0; font-size: 0.85rem; margin-bottom: 12px;
  }
  #token-box .btn-row { display: flex; gap: 8px; justify-content: flex-end; }
  #token-box button {
    padding: 6px 14px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.85rem;
  }
  #token-save { background: #e94560; color: #fff; }
  #token-cancel { background: #0f3460; color: #e0e0e0; }

  @media (max-width: 768px) {
    body { flex-direction: column; }
    #sidebar { width: 100%; min-width: 0; height: 45vh; }
    #map { height: 55vh; }
  }
</style>
</head>
<body>
<div id="sidebar">
  <div id="sidebar-header">
    <h1>Tournois SSBU France</h1>
    <div class="filters" id="type-filters">
      <button class="filter-btn active" data-type="all">Tous</button>
      <button class="filter-btn" data-type="weekly">Weekly</button>
      <button class="filter-btn" data-type="tournoi">Tournoi</button>
      <button class="filter-btn" data-type="nearby">Proche de moi</button>
    </div>
    <input type="text" id="search" placeholder="Rechercher un tournoi...">
  </div>
  <div id="stats-bar">
    <div id="stats"></div>
    <button id="refresh-btn" title="Mettre à jour les tournois">
      <span class="icon">↻</span>
      <span class="spin">↻</span>
      Actualiser
    </button>
    <button id="token-btn" title="Configurer le token GitHub" style="flex-shrink:0;padding:4px 10px;border-radius:14px;border:1px solid #e94560;background:#1a1a2e;color:#e94560;cursor:pointer;font-size:0.8rem;">⚙</button>
  </div>
  <div id="refresh-log"></div>
  <div id="tournament-list"></div>
</div>
<div id="map"></div>

<!-- Modal token GitHub -->
<div id="token-modal">
  <div id="token-box">
    <h3>🔑 Token GitHub</h3>
    <p>
      Pour actualiser depuis le navigateur, il faut un token GitHub avec les permissions <strong>workflow</strong> et <strong>contents</strong>.<br><br>
      Créer un token : <a href="https://github.com/settings/tokens/new?scopes=workflow,repo&description=smash-map-refresh" target="_blank">github.com/settings/tokens</a><br>
      (cocher <strong>repo</strong> et <strong>workflow</strong>)
    </p>
    <input type="password" id="token-input" placeholder="ghp_..." autocomplete="off">
    <div class="btn-row">
      <button id="token-cancel">Annuler</button>
      <button id="token-save">Enregistrer</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
// === Config ===
const BRIVE = [45.1598, 1.5339];
const NEARBY_KM = 150;
const DATA_INLINE = '__TOURNAMENT_DATA__';

// === Utils ===
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatDate(iso) {
  if (!iso) return '?';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' });
}

// === Map setup — France uniquement, blanc sur bleu ===
const map = L.map('map', {
  zoomControl: true,
  minZoom: 5,
  maxZoom: 13,
  attributionControl: false,
}).setView([46.8, 2.5], 6);

L.control.attribution({ prefix: false }).addTo(map);

// Pas de tuiles : fond bleu CSS + polygone France en blanc
fetch('https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/france.geojson')
  .then(r => r.json())
  .then(geojson => {
    L.geoJSON(geojson, {
      style: {
        fillColor: '#f0f4f8',
        fillOpacity: 1,
        color: '#90aec4',
        weight: 1.5,
      },
    }).addTo(map);
  });

// Grandes villes françaises (labels)
const CITIES = [
  ['Paris', 48.8566, 2.3522], ['Lyon', 45.764, 4.8357],
  ['Marseille', 43.2965, 5.3698], ['Toulouse', 43.6047, 1.4442],
  ['Bordeaux', 44.8378, -0.5792], ['Nantes', 47.2184, -1.5536],
  ['Lille', 50.6292, 3.0573], ['Strasbourg', 48.5734, 7.7521],
  ['Rennes', 48.1173, -1.6778], ['Montpellier', 43.6108, 3.8767],
  ['Nice', 43.7102, 7.262], ['Grenoble', 45.1885, 5.7245],
  ['Clermont', 45.7797, 3.0863], ['Dijon', 47.322, 5.0415],
];
CITIES.forEach(([name, lat, lon]) => {
  L.marker([lat, lon], {
    icon: L.divIcon({
      className: '',
      html: `<div style="
        font-size:10px;color:#6b8fa8;font-weight:600;
        white-space:nowrap;text-shadow:0 0 3px #fff,0 0 3px #fff;
        pointer-events:none;transform:translate(-50%,-50%);
      ">${name}</div>`,
      iconSize: [0, 0], iconAnchor: [0, 0],
    }),
    interactive: false,
    zIndexOffset: -1000,
  }).addTo(map);
});

// Home marker — anneau creux pulsant, les tournois s'affichent AU-DESSUS
const homeIcon = L.divIcon({ className: 'home-icon', iconSize: [26, 26], iconAnchor: [13, 13] });
L.marker(BRIVE, { icon: homeIcon, zIndexOffset: -500 })
  .addTo(map)
  .bindPopup('<strong>📍 Brive-la-Gaillarde</strong><br>Votre position');

// Marker cluster
const markers = L.markerClusterGroup({
  maxClusterRadius: 40,
  spiderfyOnMaxZoom: true,
  showCoverageOnHover: false,
});
map.addLayer(markers);

// === Marker icons — taille uniforme ===
function createIcon(type) {
  const colors = { weekly: '#a855f7', tournoi: '#3b82f6' };
  const color = colors[type] || '#3b82f6';
  return L.divIcon({
    className: '',
    html: `<div style="
      width:13px;height:13px;border-radius:50%;
      background:${color};border:2px solid #fff;
      box-shadow:0 0 5px ${color};
    "></div>`,
    iconSize: [13, 13],
    iconAnchor: [6, 6],
  });
}

// === State ===
let allTournaments = [];
let activeFilter = 'all';
let searchQuery = '';

// === Render ===
function getFiltered() {
  return allTournaments.filter(t => {
    if (activeFilter === 'nearby' && t._distance > NEARBY_KM) return false;
    if (activeFilter === 'weekly' && t.type !== 'weekly') return false;
    if (activeFilter === 'tournoi' && t.type !== 'tournoi') return false;
    if (searchQuery && !t.name.toLowerCase().includes(searchQuery)) return false;
    return true;
  });
}

function render() {
  const filtered = getFiltered();

  // Sort by date then distance
  filtered.sort((a, b) => {
    if (a.date && b.date) {
      const d = a.date.localeCompare(b.date);
      if (d !== 0) return d;
    }
    return a._distance - b._distance;
  });

  // Stats
  document.getElementById('stats').textContent =
    `${filtered.length} tournoi${filtered.length > 1 ? 's' : ''} affiche${filtered.length > 1 ? 's' : ''}`;

  // List
  const list = document.getElementById('tournament-list');
  list.innerHTML = filtered.map((t, i) => `
    <div class="tournament-item" data-idx="${i}">
      <div class="t-name">
        ${t.name}
        <span class="t-type type-${t.type}">${t.type}</span>
      </div>
      <div class="t-meta">
        <span>${formatDate(t.date)}</span>
        <span>${t.city}</span>
        <span class="t-distance">${Math.round(t._distance)} km</span>
      </div>
    </div>
  `).join('');

  // Click handlers
  list.querySelectorAll('.tournament-item').forEach(el => {
    el.addEventListener('click', () => {
      const t = filtered[parseInt(el.dataset.idx)];
      if (t._marker) {
        map.setView([t.lat, t.lon], 12);
        t._marker.openPopup();
      }
    });
  });

  // Map markers
  markers.clearLayers();
  filtered.forEach(t => {
    const m = L.marker([t.lat, t.lon], { icon: createIcon(t.type), zIndexOffset: 500 });
    const typeLabel = t.type === 'weekly'
      ? '<span class="popup-type" style="background:#7c3aed;color:#e9d5ff">weekly</span>'
      : '<span class="popup-type" style="background:#1d4ed8;color:#bfdbfe">tournoi</span>';
    m.bindPopup(`
      <strong><a href="${t.url}" target="_blank">${t.name}</a></strong> ${typeLabel}<br>
      ${formatDate(t.date)}<br>
      ${t.address}<br>
      <span style="color:#e94560;font-weight:600">${Math.round(t._distance)} km de Brive</span>
    `);
    t._marker = m;
    markers.addLayer(m);
  });

  // Zoom to nearby if filter active
  if (activeFilter === 'nearby' && filtered.length > 0) {
    const bounds = L.latLngBounds(filtered.map(t => [t.lat, t.lon]));
    bounds.extend(BRIVE);
    map.fitBounds(bounds, { padding: [30, 30] });
  }
}

// === Events ===
document.getElementById('type-filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.type;
  render();
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
  render();
});

// === Load data ===
async function loadData(bustCache = false) {
  let data;
  // Check for inlined data
  if (DATA_INLINE !== '__' + 'TOURNAMENT_DATA' + '__') {
    data = JSON.parse(DATA_INLINE);
  } else {
    const url = bustCache ? `./tournaments.json?t=${Date.now()}` : './tournaments.json';
    const res = await fetch(url);
    data = await res.json();
  }

  // Filter: only today and future tournaments
  const today = new Date().toISOString().slice(0, 10);
  allTournaments = data.tournaments
    .filter(t => t.date && t.date >= today)
    .map(t => ({
      ...t,
      _distance: haversine(BRIVE[0], BRIVE[1], t.lat, t.lon),
    }));

  document.getElementById('stats').textContent =
    `${allTournaments.length} tournois - donnees du ${new Date(data.scraped_at).toLocaleDateString('fr-FR')}`;

  render();
}

loadData().catch(err => {
  document.getElementById('stats').textContent = 'Erreur: ' + err.message;
  console.error(err);
});

// === Config ===
const GH_OWNER = 'juliendidier-creator';
const GH_REPO  = 'smash-map';
const GH_WORKFLOW = 'scrape.yml';
const IS_LOCAL = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

// === Token modal ===
const tokenModal = document.getElementById('token-modal');
document.getElementById('token-btn').addEventListener('click', () => {
  document.getElementById('token-input').value = localStorage.getItem('gh_token') || '';
  tokenModal.classList.add('visible');
});
document.getElementById('token-cancel').addEventListener('click', () => tokenModal.classList.remove('visible'));
document.getElementById('token-save').addEventListener('click', () => {
  const val = document.getElementById('token-input').value.trim();
  if (val) localStorage.setItem('gh_token', val);
  tokenModal.classList.remove('visible');
});

// === Bouton Actualiser ===
document.getElementById('refresh-btn').addEventListener('click', async () => {
  const btn = document.getElementById('refresh-btn');
  const log = document.getElementById('refresh-log');

  btn.disabled = true;
  btn.classList.add('loading');
  log.innerHTML = '';
  log.classList.add('visible');

  const addLog = (text, isError) => {
    const line = document.createElement('div');
    line.style.color = isError ? '#e94560' : '#888';
    line.textContent = text;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
  };

  // En local : utilise le serveur Node directement
  if (IS_LOCAL) {
    try {
      await fetch('/refresh', { method: 'POST' });
      await new Promise((resolve, reject) => {
        const es = new EventSource('/refresh-events');
        es.onmessage = e => {
          const msg = JSON.parse(e.data);
          if (msg.type === 'log') addLog(msg.text);
          else if (msg.type === 'done') { es.close(); resolve(); }
          else if (msg.type === 'error') { es.close(); reject(new Error('Erreur scraper')); }
        };
        es.onerror = () => { es.close(); reject(new Error('Connexion perdue')); };
        setTimeout(() => { es.close(); reject(new Error('Timeout')); }, 120000);
      });
      await loadData();
      addLog('✅ Carte mise à jour !');
      setTimeout(() => log.classList.remove('visible'), 3000);
    } catch (err) {
      addLog('❌ ' + err.message, true);
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
    return;
  }

  // En ligne (GitHub Pages) : déclenche GitHub Actions
  const token = localStorage.getItem('gh_token');
  if (!token) {
    btn.disabled = false;
    btn.classList.remove('loading');
    log.classList.remove('visible');
    document.getElementById('token-input').value = '';
    tokenModal.classList.add('visible');
    return;
  }

  try {
    // Déclenche le workflow
    addLog('🚀 Lancement du scraper sur GitHub Actions...');
    const triggerRes = await fetch(
      `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/actions/workflows/${GH_WORKFLOW}/dispatches`,
      { method: 'POST', headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ ref: 'main' }) }
    );
    if (!triggerRes.ok) {
      const err = await triggerRes.json().catch(() => ({}));
      if (triggerRes.status === 401) throw new Error('Token invalide — clique sur ⚙ pour le mettre à jour');
      throw new Error(err.message || `Erreur GitHub ${triggerRes.status}`);
    }

    addLog('⏳ Scraping en cours (~1-2 min)...');
    await new Promise(r => setTimeout(r, 5000)); // laisse le temps au run de démarrer

    // Attend que le dernier run soit terminé
    let attempts = 0;
    while (attempts < 24) {
      await new Promise(r => setTimeout(r, 8000));
      const runsRes = await fetch(
        `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/actions/runs?event=workflow_dispatch&per_page=1`,
        { headers: { Authorization: `Bearer ${token}` } }
      );
      const { workflow_runs: runs } = await runsRes.json();
      const run = runs?.[0];
      if (!run) { attempts++; continue; }

      if (run.status === 'completed') {
        if (run.conclusion === 'success') {
          addLog('✅ Scraping terminé, rechargement des données...');
          await new Promise(r => setTimeout(r, 3000)); // laisse GitHub Pages se redéployer
          await loadData(true);
          addLog('🎮 Carte mise à jour !');
          setTimeout(() => log.classList.remove('visible'), 4000);
        } else {
          throw new Error(`Workflow terminé avec erreur : ${run.conclusion}`);
        }
        break;
      }
      attempts++;
    }
    if (attempts >= 24) throw new Error('Timeout — vérifie GitHub Actions');

  } catch (err) {
    addLog('❌ ' + err.message, true);
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
});
</script>
</body>
</html>
